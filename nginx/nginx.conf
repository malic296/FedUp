events {}

http {
    server {
        listen 80;

        location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}

	location / {
		return 301 https://$host$request_uri;
	}

    }

    server {
	listen 443 ssl;
        server_name fedup.live;

        ssl_certificate /etc/letsencrypt/live/fedup.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fedup.live/privkey.pem;

        location / {
                proxy_pass http://web:5000;
        }

    }
}
