name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build application images
        run: docker compose build api web

      - name: Start database and cache
        run: docker compose up -d db redis

      - name: Run database migrations
        run: docker compose run --rm migrate

      - name: Run API tests
        run: docker compose run --rm api python -m pytest tests/

      - name: Push application images
        run: docker compose push api web

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/NewsAggregator
            git pull origin main
            docker compose pull api web scheduler
            docker compose up -d db redis
            docker compose run --rm migrate
            docker compose up -d --remove-orphans api web nginx scheduler
